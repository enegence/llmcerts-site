<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

  "badgeColor": "#1A1D2E",

// ─── LOGO: Hexagon network + open book ───────────────────────────────────
function LLMCertsLogo({ size = 36, darkBg = true, showText = true, badgeColor, accentColor, fontPairing }) {
  const dark    = darkBg ? '#ffffff' : '#1A1D2E';
  const accent  = accentColor || '#10B981';
  const textClr = darkBg ? '#ffffff' : '#1A1D2E';
  const tagClr  = darkBg ? 'rgba(255,255,255,0.45)' : '#888';
  const fonts   = { grotesk:"'Space Grotesk',sans-serif", syne:"'Syne',sans-serif", ibm:"'IBM Plex Sans',sans-serif" };
  const fontStack = fonts[fontPairing] || fonts.ibm;

  const cx = 50, cy = 50, Ro = 42, Ri = 22;
  const outerR = 6.5, innerR = 3.8;
  const d2r = d => d * Math.PI / 180;

  // Outer nodes: N1(12), N2(2), N3(4), N4(6), N5(8), N6(10) — clockwise from top
  const O = [90, 30, -30, -90, -150, 150].map(d => ({
    x: cx + Ro * Math.cos(d2r(d)),
    y: cy - Ro * Math.sin(d2r(d)),
  }));
  // Inner nodes: N7(12), N8(2), N9(4), N10(8), N11(10) — no bottom
  const I = [90, 30, -30, -150, 150].map(d => ({
    x: cx + Ri * Math.cos(d2r(d)),
    y: cy - Ri * Math.sin(d2r(d)),
  }));

  // Shorten line from (x1,y1) toward (x2,y2), stopping `stop` px from (x2,y2)
  const short = (x1,y1,x2,y2,stop) => {
    const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
    if (len <= stop) return {x:x1, y:y1};
    const t = (len-stop)/len;
    return {x: x1+dx*t, y: y1+dy*t};
  };
  const outerGap = outerR + 2; // stop this far from outer node center

  // Open book fits just inside inner cluster
  // N9(~69,61) and N10(~31,61) → right edge 64, left edge 36, 1px gap
  // N7(50,28) → top edge ~33
  const bT  = {x:50, y:33};  // spine peak (top)
  const bTR = {x:64, y:41};  // top-right
  const bMC = {x:50, y:49};  // mid-center (spine valley)
  const bTL = {x:36, y:41};  // top-left
  const bBC = {x:50, y:65};  // bottom-center
  const bBR = {x:64, y:57};  // bottom-right
  const bBL = {x:36, y:57};  // bottom-left

  const adj = (hex, amt) => {
    const c = v => Math.max(0, Math.min(255, v));
    return `rgb(${c(parseInt(hex.slice(1,3),16)+amt)},${c(parseInt(hex.slice(3,5),16)+amt)},${c(parseInt(hex.slice(5,7),16)+amt)})`;
  };

  return (
    <div style={{display:'flex', alignItems:'center', gap: showText ? 10 : 0}}>
      <svg width={size} height={size} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">

        {/* ── OUTER HEX EDGES ── */}
        {/* N1–N2: full dark */}
        <line x1={O[0].x} y1={O[0].y} x2={O[1].x} y2={O[1].y} stroke={dark} strokeWidth="2.2" strokeLinecap="round"/>
        {/* N2→N3: dark, stops 2px short of N3 */}
        {(()=>{ const e=short(O[1].x,O[1].y,O[2].x,O[2].y,outerGap); return <line x1={O[1].x} y1={O[1].y} x2={e.x} y2={e.y} stroke={dark} strokeWidth="2.2" strokeLinecap="round"/>; })()}
        {/* N3→N4: accent, stops 2px short of N4 */}
        {(()=>{ const e=short(O[2].x,O[2].y,O[3].x,O[3].y,outerGap); return <line x1={O[2].x} y1={O[2].y} x2={e.x} y2={e.y} stroke={accent} strokeWidth="2.2" strokeLinecap="round"/>; })()}
        {/* N4–N5: full dark */}
        <line x1={O[3].x} y1={O[3].y} x2={O[4].x} y2={O[4].y} stroke={dark} strokeWidth="2.2" strokeLinecap="round"/>
        {/* N5–N6: full dark */}
        <line x1={O[4].x} y1={O[4].y} x2={O[5].x} y2={O[5].y} stroke={dark} strokeWidth="2.2" strokeLinecap="round"/>
        {/* N6–N1: full dark */}
        <line x1={O[5].x} y1={O[5].y} x2={O[0].x} y2={O[0].y} stroke={dark} strokeWidth="2.2" strokeLinecap="round"/>

        {/* ── SPOKES: inner → outer, stopping 2px short of outer node ── */}
        {/* N7→N1 */}
        {(()=>{ const e=short(I[0].x,I[0].y,O[0].x,O[0].y,outerGap); return <line x1={I[0].x} y1={I[0].y} x2={e.x} y2={e.y} stroke={accent} strokeWidth="1.7" strokeLinecap="round"/>; })()}
        {/* N8→N2 */}
        {(()=>{ const e=short(I[1].x,I[1].y,O[1].x,O[1].y,outerGap); return <line x1={I[1].x} y1={I[1].y} x2={e.x} y2={e.y} stroke={accent} strokeWidth="1.7" strokeLinecap="round"/>; })()}
        {/* N9→N3: full accent line (both nodes are accent) */}
        <line x1={I[2].x} y1={I[2].y} x2={O[2].x} y2={O[2].y} stroke={accent} strokeWidth="1.7" strokeLinecap="round"/>
        {/* N10→N5 */}
        {(()=>{ const e=short(I[3].x,I[3].y,O[4].x,O[4].y,outerGap); return <line x1={I[3].x} y1={I[3].y} x2={e.x} y2={e.y} stroke={accent} strokeWidth="1.7" strokeLinecap="round"/>; })()}
        {/* N11→N6 */}
        {(()=>{ const e=short(I[4].x,I[4].y,O[5].x,O[5].y,outerGap); return <line x1={I[4].x} y1={I[4].y} x2={e.x} y2={e.y} stroke={accent} strokeWidth="1.7" strokeLinecap="round"/>; })()}

        {/* ── INNER CONNECTIONS: N7–N8, N7–N11, N8–N9, N10–N11 ── */}
        <line x1={I[0].x} y1={I[0].y} x2={I[1].x} y2={I[1].y} stroke={accent} strokeWidth="1.5" strokeLinecap="round"/>
        <line x1={I[0].x} y1={I[0].y} x2={I[4].x} y2={I[4].y} stroke={accent} strokeWidth="1.5" strokeLinecap="round"/>
        <line x1={I[1].x} y1={I[1].y} x2={I[2].x} y2={I[2].y} stroke={accent} strokeWidth="1.5" strokeLinecap="round"/>
        <line x1={I[3].x} y1={I[3].y} x2={I[4].x} y2={I[4].y} stroke={accent} strokeWidth="1.5" strokeLinecap="round"/>

        {/* ── OPEN BOOK (isometric) ── */}
        {/* Top face — open pages, lighter */}
        <polygon points={`${bT.x},${bT.y} ${bTR.x},${bTR.y} ${bMC.x},${bMC.y} ${bTL.x},${bTL.y}`} fill={adj(accent,55)}/>
        {/* Left page face */}
        <polygon points={`${bTL.x},${bTL.y} ${bMC.x},${bMC.y} ${bBC.x},${bBC.y} ${bBL.x},${bBL.y}`} fill={accent}/>
        {/* Right page face */}
        <polygon points={`${bMC.x},${bMC.y} ${bTR.x},${bTR.y} ${bBR.x},${bBR.y} ${bBC.x},${bBC.y}`} fill={adj(accent,-35)}/>
        {/* Spine crease */}
        <line x1={bT.x} y1={bT.y} x2={bMC.x} y2={bMC.y} stroke="rgba(255,255,255,0.25)" strokeWidth="1"/>

        {/* ── INNER NODES (accent) ── */}
        {I.map((p,i) => <circle key={`in${i}`} cx={p.x} cy={p.y} r={innerR} fill={accent}/>)}

        {/* ── OUTER NODES: N3 is accent, rest are dark ── */}
        {O.map((p,i) => <circle key={`on${i}`} cx={p.x} cy={p.y} r={outerR} fill={i===2 ? accent : dark}/>)}

      </svg>

      {showText && (
        <div style={{display:'flex', flexDirection:'column', lineHeight:1}}>
          <span style={{fontFamily:fontStack, fontWeight:700, fontSize:size*0.62, letterSpacing:'-0.02em', lineHeight:1, color:textClr}}>
            LLM<span style={{color:accent}}>Certs</span>
          </span>
          <span style={{fontFamily:"'DM Sans',sans-serif", fontWeight:600, fontSize:size*0.19, letterSpacing:'0.13em', color:tagClr, marginTop:4, whiteSpace:'nowrap'}}>
            LEARN · PRACTICE · CERTIFY
          </span>
        </div>
      )}
    </div>
  );
}

// ─── DATA ─────────────────────────────────────────────────────────────────
const CERTS = [
  {vendor:'OpenAI', name:'AI Foundations', audience:'General / Job-ready', availability:'Limited', coding:false, focus:'General AI / LLM'},
  {vendor:'OpenAI', name:'OpenAI Certification', audience:'General', availability:'Limited', coding:false, focus:'General AI / Platform'},
  {vendor:'Anthropic', name:'Claude Certified Architect, Foundations', audience:'Architects', availability:'Partner', coding:true, focus:'Claude / Architecture'},
  {vendor:'Google', name:'Google Cloud Generative AI Leader', audience:'Business / Leadership', availability:'Public', coding:false, focus:'GenAI Strategy'},
  {vendor:'AWS', name:'AWS Certified AI Practitioner', audience:'Foundational', availability:'Public', coding:false, focus:'AI / ML / GenAI'},
  {vendor:'AWS', name:'AWS Certified Generative AI Developer – Professional', audience:'Developers', availability:'Public', coding:true, focus:'GenAI / Bedrock'},
  {vendor:'GitHub', name:'GitHub Copilot Certification', audience:'Developers', availability:'Public', coding:true, focus:'Copilot / AI Coding'},
  {vendor:'Microsoft', name:'Azure AI Fundamentals (AI-900)', audience:'Foundational', availability:'Public', coding:false, focus:'Azure AI'},
  {vendor:'Microsoft', name:'Azure AI Engineer Associate (AI-102)', audience:'Engineers', availability:'Public', coding:true, focus:'Azure AI Engineering'},
  {vendor:'Microsoft', name:'AI Business Professional', audience:'Business / Leaders', availability:'Public', coding:false, focus:'Business AI'},
  {vendor:'Microsoft', name:'AI Transformation Leader', audience:'Executives', availability:'Public', coding:false, focus:'AI Transformation'},
  {vendor:'Microsoft', name:'M365 Copilot & Agent Administration', audience:'Admins / IT', availability:'Public', coding:false, focus:'Copilot Admin'},
  {vendor:'NVIDIA', name:'Generative AI and LLMs Associate', audience:'Practitioners', availability:'Public', coding:false, focus:'LLMs / GenAI'},
  {vendor:'NVIDIA', name:'Generative AI LLMs Professional', audience:'Engineers', availability:'Public', coding:true, focus:'LLMs / GenAI'},
  {vendor:'Databricks', name:'Databricks Certified Generative AI Engineer Associate', audience:'Data / AI Engineers', availability:'Public', coding:true, focus:'GenAI Engineering'},
  {vendor:'Snowflake', name:'SnowPro Specialty: Gen AI', audience:'Data Practitioners', availability:'Public', coding:false, focus:'GenAI on Snowflake'},
  {vendor:'IBM', name:'IBM Certified watsonx Generative AI Engineer – Associate', audience:'Engineers', availability:'Public', coding:true, focus:'watsonx / GenAI'},
  {vendor:'Oracle', name:'Oracle Cloud Infrastructure Generative AI Professional', audience:'Engineers', availability:'Public', coding:true, focus:'OCI / GenAI'},
  {vendor:'SAP', name:'SAP Certified – SAP Generative AI Developer', audience:'Developers', availability:'Public', coding:true, focus:'SAP / GenAI'},
  {vendor:'Salesforce', name:'Salesforce Certified Agentforce Specialist', audience:'Admins / Builders', availability:'Public', coding:false, focus:'Agents / Salesforce'},

];

const VENDORS = ['All', ...Array.from(new Set(CERTS.map(c => c.vendor)))];

// ─── LAVA LAMP ───────────────────────────────────────────────────────────
function LavaLamp({ bgColor, accentColor, lavaColor }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const resize = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    };
    resize();
    window.addEventListener('resize', resize);

    // Parse accent color to rgba
    const hexToRgb = (hex) => {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return [r,g,b];
    };

    const BLOB_COLORS = {
      accent:  () => hexToRgb(accentColor),
      warm:    () => [255, 120, 60],
      cool:    () => [60, 140, 255],
      purple:  () => [160, 80, 255],
      multi:   (i) => [[255,80,120],[80,180,255],[120,255,160],[255,200,60]][i%4],
    };

    const N = 9;
    const blobs = Array.from({length: N}, (_, i) => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: 60 + Math.random() * 100,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.6 - 0.1,
      phase: Math.random() * Math.PI * 2,
      speed: 0.003 + Math.random() * 0.005,
      colorIdx: i,
    }));

    let frame = 0;
    const draw = () => {
      frame++;
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      blobs.forEach(b => {
        b.phase += b.speed;
        b.x += b.vx + Math.sin(b.phase * 0.7) * 0.3;
        b.y += b.vy + Math.cos(b.phase * 0.5) * 0.2;
        // Bounce
        if (b.x < -b.r) b.x = canvas.width + b.r;
        if (b.x > canvas.width + b.r) b.x = -b.r;
        if (b.y < -b.r) { b.y = -b.r; b.vy = Math.abs(b.vy) * 0.6; }
        if (b.y > canvas.height + b.r) { b.y = canvas.height + b.r; b.vy = -Math.abs(b.vy) * 0.6; }
        // Drift vertically
        const midY = canvas.height / 2;
        b.vy += (midY - b.y) * 0.00005;
        b.vy *= 0.998;
        b.vx *= 0.999;

        const colorFn = BLOB_COLORS[lavaColor] || BLOB_COLORS.accent;
        const [r,g,bv] = colorFn(b.colorIdx);
        const pulsedR = b.r * (0.88 + 0.12 * Math.sin(b.phase));

        const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, pulsedR);
        grad.addColorStop(0,   `rgba(${r},${g},${bv},0.18)`);
        grad.addColorStop(0.4, `rgba(${r},${g},${bv},0.10)`);
        grad.addColorStop(1,   `rgba(${r},${g},${bv},0)`);
        ctx.beginPath();
        ctx.arc(b.x, b.y, pulsedR, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      });

      animRef.current = requestAnimationFrame(draw);
    };
    draw();
    return () => {
      cancelAnimationFrame(animRef.current);
      window.removeEventListener('resize', resize);
    };
  }, [accentColor, lavaColor]);

  return <canvas ref={canvasRef} style={{position:'absolute', inset:0, width:'100%', height:'100%', pointerEvents:'none', zIndex:0}}/>;
}

// ─── CERT CARD ────────────────────────────────────────────────────────────
function CertCard({ cert, tweaks }) {
  const { accentColor, cardStyle, showCodingBadge, fontPairing } = tweaks;
  const fontHead = FONT_HEADS[fontPairing] || FONT_HEADS.grotesk;
  const vColor = VENDOR_COLORS[cert.vendor];

  const cardStyles = {
    bordered: { border: `1px solid #E2E4F3`, boxShadow: 'none' },
    elevated: { border: '1px solid transparent', boxShadow: '0 4px 20px rgba(0,0,0,0.09)' },
    flat:     { border: 'none', boxShadow: 'none', background: '#F5F6FF' },
  };
  const hoverShadow = {
    bordered: `0 8px 32px ${accentColor}18`,
    elevated: `0 12px 36px rgba(0,0,0,0.14)`,
    flat:     'none',
  };

  const [hovered, setHovered] = useState(false);

  return (
    <div
      className="cert-card"
      style={{
        ...cardStyles[cardStyle] || cardStyles.bordered,
        boxShadow: hovered ? hoverShadow[cardStyle] : (cardStyles[cardStyle] || cardStyles.bordered).boxShadow,
        borderColor: hovered ? `${accentColor}30` : undefined,
      }}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
    >
      <div className="cert-card-header">
        <span className="vendor-pill" style={{background: vColor+'18', color: vColor}}>{cert.vendor}</span>
        <span className="audience-tag">{cert.audience}</span>
      </div>
      <div className="cert-name" style={{fontFamily: fontHead, color: '#0C1033'}}>{cert.name}</div>
      <div className="cert-meta">
        <span className={`meta-chip ${cert.availability === 'Public' ? 'chip-public' : 'chip-limited'}`}>
          {cert.availability === 'Public' ? '✓ Public' : '⚡ ' + cert.availability}
        </span>
        {showCodingBadge && cert.coding && <span className="meta-chip chip-coding">{'</>'} Dev-focused</span>}
        <span className="meta-chip chip-focus">{cert.focus}</span>
      </div>
      <a href="https://train.llmcerts.com"
        style={{
          fontFamily: "'DM Sans', sans-serif",
          fontSize: 13, fontWeight: 600,
          color: tweaks.btnStyle === 'outline' ? accentColor : '#fff',
          background: tweaks.btnStyle === 'outline' ? 'transparent' : tweaks.btnStyle === 'gradient' ? `linear-gradient(135deg, ${accentColor}, #3A4FFF)` : accentColor,
          border: tweaks.btnStyle === 'outline' ? `1.5px solid ${accentColor}` : 'none',
          cursor: 'pointer', padding: '9px 0',
          borderRadius: 8, width: '100%',
          textAlign: 'center', textDecoration: 'none',
          display: 'block', transition: 'opacity 0.15s',
        }}
      >
        Start Training →
      </a>
    </div>
  );
}

          </div>
        </div>

        <div className="tweak-section">
          <div className="tweak-section-label">Hero Headline</div>
          <div className="tweak-toggle">
            {[['default','Default'],['bold','Bold'],['action','Action']].map(([k,l]) => (
              <div key={k} className={`toggle-opt${heroHeadline===k?' sel':''}`} onClick={()=>updateTweak('heroHeadline',k)}>{l}</div>
            ))}
          </div>
        </div>

        <div className="tweak-section">
          <div className="tweak-section-label">Marquee Speed</div>
          <div className="tweak-toggle">
            {[['slow','Slow'],['normal','Normal'],['fast','Fast']].map(([k,l]) => (
              <div key={k} className={`toggle-opt${tweaks.marqueeSpeed===k?' sel':''}`} onClick={()=>updateTweak('marqueeSpeed',k)}>{l}</div>
            ))}
          </div>
        </div>

        <div className="tweak-section">
          <div className="tweak-section-label">Lava Lamp Color</div>
          <div className="tweak-toggle">
            {[['accent','Accent'],['warm','Warm'],['cool','Cool'],['purple','Purple'],['multi','Multi']].map(([k,l]) => (
              <div key={k} className={`toggle-opt${tweaks.lavaColor===k?' sel':''}`} onClick={()=>updateTweak('lavaColor',k)}>{l}</div>
            ))}
          </div>
        </div>

        <div className="tweak-section">
          <div className="tweak-section-label">Ticker Bar</div>
          <div className="tweak-toggle">
            {[['dark','Dark'],['mid','Mid'],['accent','Accent'],['light','Light']].map(([k,l]) => (
              <div key={k} className={`toggle-opt${tweaks.tickerBg===k?' sel':''}`} onClick={()=>updateTweak('tickerBg',k)}>{l}</div>
            ))}
          </div>
        </div>

        <div className="tweak-section">
          <div className="tweak-section-label">Footer</div>
          <div className="tweak-toggle">
            {[['dark','Dark'],['navy','Navy'],['black','Black'],['accent','Accent'],['light','Light']].map(([k,l]) => (
              <div key={k} className={`toggle-opt${tweaks.footerBg===k?' sel':''}`} onClick={()=>updateTweak('footerBg',k)}>{l}</div>
            ))}
          </div>
        </div>

        <div className="tweak-section">
          <div className="tweak-section-label">Show / Hide</div>
          {[['showStats','Stats bar'],['showCodingBadge','Dev badges'],['showTagline','Tagline']].map(([k,l]) => (
            <div key={k} className="tweak-row" style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
              <span className="tweak-label" style={{margin:0}}>{l}</span>
              <div className="tweak-toggle" style={{width:80}}>
                <div className={`toggle-opt${tweaks[k]?' sel':''}`} style={{flex:1, padding:'4px 0'}} onClick={()=>updateTweak(k,true)}>On</div>
                <div className={`toggle-opt${!tweaks[k]?' sel':''}`} style={{flex:1, padding:'4px 0'}} onClick={()=>updateTweak(k,false)}>Off</div>
              </div>
            </div>
          ))}
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
